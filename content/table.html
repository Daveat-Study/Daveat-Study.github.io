<html lang=""km> <!-- Table.html -->

    <head>
        <title>តារាង</title>
    </head>

    <body>
        <table border="1">
            <tr>
                <th>ល.រ</th><th>ឈ្មោះ</th><th>ទូរស័ព្ទ</th>
            </tr>
            <tr>
                <th>១</th><th>ខន ដាវៀត</th><th>០១១៧២៥២២៨</th>
            </tr>
            <tr>
                <th>២</th><th>ជុំ ម៉ាប់</th><th>០១១១២៣៤៥៦</th>
            </tr>
            <tr>
                <th>៣</th><th>ចាន់ ម៉ុន្នីនាថ</th><th>០១១៤៦០០៧៨</th>
            </tr>
        </table>

        <!-- Table តាងតារាង tr តាងជួរដេកនៃតារាង (table row) th តាងក្បាលតារាងឬឈ្មោះជួរឈរ (table header) td តាងក្រឡាទិន្នន័យ (table data)-->

    </body>
</html>
