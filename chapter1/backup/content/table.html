<html lang=""km> <!-- Table.html -->

            tr:nth-child(1){
                font-family: 'Khmer';
                background-color: black;
                color: white;
            }

            tr:nth-child(2n){
                background-color: lightgrey;
            }
        </style>
    </head>

    <body>

        <ul> <!-- Menu គឺបញ្ជីរាយតំណដោយប្រើ មេធាតុ ul កូនធាតុ li និង ចៅធាតុ al -->
            <li> <a href="#" id="active">ទំព័រដើម</a> </li>

            </tr>

        <!-- Table តាងតារាង tr តាងជួរដេកនៃតារាង (table row) th តាងក្បាលតារាងឬឈ្មោះជួរឈរ (table header) td តាងក្រឡាទិន្នន័យ (table data)-->
