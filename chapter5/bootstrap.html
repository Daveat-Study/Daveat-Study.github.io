<!doctype html> <!-- ប្រើ HTML Version 5 -->
<html lang="en">
  <head>
    <!-- Meta is data about data ទិន្នន័យស្តីអំពីទិន្នន័យ -->
    <!-- In HTML, Meta ជាធាតុ១ដែលប្រើសម្រាប់បញ្ចាក់ទិន្នន័យឬបន្ថែម -->
    <meta charset="utf-8">
    <!-- charset is សំណុំនៃលេខដែលតាងអោយអក្សរនិងសញ្ញា -->
    <!-- 
        U: Unicode
        T: Tranformation
        F: Format 
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- initial-scale=1: 100% screen and no need ពង្រីកឬបង្រួម -->
    <title>Bootstrap demo</title>
    <link href="./css/bootstrap.css" rel="stylesheet">
  </head>
  <body>
    <!-- <h1 >h1</h1> <p>h1</p>
    <h1 >h1</h1> <p>h1</p>
    <h1 >h1</h1> <p>h1</p>
    <h1 >h1</h1> <p>h1</p>
    <h1 >h1</h1> <p>h1</p>
    <h1 >h1</h1> <p>h1</p> -->

    <h1 class="display-1">h1</h1> <p class="h1">h1</p>
    <h1 class="display-2">h2 - bigger</h1> <p class="h2">h2</p>
    <h1 class="display-3">h3 - bigger</h1> <p class="h3">h3</p>
    <h1 class="display-4">h4 - bigger</h1> <p class="h4">h4</p>
    <h1 class="display-5">h5 - bigger</h1> <p class="h5">h5</p>
    <h1 class="display-6">h6 - bigger</h1> <p class="h6">h6</p>
    <script src="./script/bootstrap.bundle.js"></script>
  </body>
</html>
