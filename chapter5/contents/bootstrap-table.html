<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- Meta is data about data бһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһҹбҹ’бһҸбһёбһўбҹҶбһ–бһёбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷ -->
        <!-- In HTML, Meta бһҮбһ¶бһ’бһ¶бһҸбһ»бҹЎбһҠбҹӮбһӣбһ”бҹ’бһҡбһҫбһҹбһҳбҹ’бһҡбһ¶бһ”бҹӢбһ”бһүбҹ’бһ…бһ¶бһҖбҹӢбһ‘бһ·бһ“бҹ’бһ“бһ“бҹҗбһҷбһ¬бһ”бһ“бҹ’бһҗбҹӮбһҳ -->
        <meta charset="utf-8">
        <!-- charset is бһҹбҹҶбһҺбһ»бҹҶбһ“бҹғбһӣбҹҒбһҒбһҠбҹӮбһӣбһҸбһ¶бһ„бһўбҹ„бһҷбһўбһҖбҹ’бһҹбһҡбһ“бһ·бһ„бһҹбһүбҹ’бһүбһ¶ -->
        <!-- 
            U: Unicode
            T: Tranformation
            F: Format 
        -->
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- initial-scale=1: 100% screen and no need бһ–бһ„бҹ’бһҡбһёбһҖбһ¬бһ”бһ„бҹ’бһҡбһҪбһҳ -->
        <title>Bootstrap Table</title>
        <link href="../css/bootstrap.css" rel="stylesheet">
    </head>
    <body>

        <table class="table">
            <thead>
              <tr>
                <th scope="col">#</th>
                <th scope="col">First</th>
                <th scope="col">Last</th>
                <th scope="col">Handle</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">1</th>
                <td>Mark</td>
                <td>Otto</td>
                <td>@mdo</td>
              </tr>
              <tr>
                <th scope="row">2</th>
                <td>Jacob</td>
                <td>Thornton</td>
                <td>@fat</td>
              </tr>
              <tr>
                <th scope="row">3</th>
                <td colspan="2">Larry the Bird</td>
                <td>@twitter</td>
              </tr>
            </tbody>
        </table>
        <script src="./script/bootstrap.bundle.js"></script>
    </body>
</html>
