<html>
    <head>
        <title>Boxes</title>
        <style type="text/css">
            div{
                background-color: yellow;
                width: 250px;;
                height: 250px;;
                padding-top: 64px;
                padding-right: 0;
                padding-left: 32px;
                padding-top: 0;
                margin-bottom: 16px;
                /* padding: ទាំងបួនជ្រុង */ 
            }
        </style>
    </head>

    <body>
        <!-- inline style ប្រើគុណលក្ខណៈ style សរសេរ declaration -->
        <div style="border: 16px inset lightgrey">inset</div>
        <div style="border: 16px outset lightgrey">outset</div>
        <div style="border: 16px groove lightgrey">groove</div>
        <div style="border: 16px ridge lightgrey">ridge</div>
        
    </body>
</html>
