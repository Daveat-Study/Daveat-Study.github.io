    <body>
        <!-- inline style ប្រើគុណលក្ខណៈ style សរសេរ declaration -->
        <p style="font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif">ផ្តើមដោយឈ្មោះពុម្ភអក្សរទាំងឡាយបញ្ចប់ដោយប្រភេទពុម្ភអក្សរ</p>
        
        <p style="font-size: 16px">ទំហំពុម្ភអក្សរ</p>
        <p style="font-size: 3rem">ទំហំពុម្ភអក្សរ</p>
        <p style="line-height: 25px">គម្លាតជួរបន្ទាត់</p>
        <p style="font-style: italic">រចនាបទអក្សរទ្រេត</p>

        <p style="font-variant: small-caps;">
            small capital letters ពុម្ភអក្សរធំ តែកម្ពស់ប៉ុនអក្សរតូច
        </p>

        <p style="font: 16px 'khmer os siemreap'; ">
            font: ទំហំ ស្រឡាយ;
        </p>

        <p style="font: italic small-caps bold 18px/25px 'khmer OS Moul Light';">
            font: អក្សរទ្រេត អក្សរធំទាប ដិត ទំហំ/កម្ពស់បន្ទាត់ ស្រឡាយ;
        </p>
